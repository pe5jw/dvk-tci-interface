[bridge]
cat_port = 4532
tci_url = ws://localhost:40001
tci_receiver = 0
dvk_dir = dvk_wav

[audio]
# Volume DVK afspelen naar TCI TX stream (0.0 - 2.0, 1.0 = normaal)
dvk_tx_volume = 1.0

# Volume DVK opnemen van TCI RX stream (0.0 - 2.0, 1.0 = normaal)
dvk_rx_volume = 1.0

# TCI audio sample rate (48000 standaard)
sample_rate = 48000

# Samples per TCI frame (2400 = 50ms bij 48kHz)
frame_samples = 2400

# Debug: speel DVK WAV ook lokaal af via Windows audio (true/false)
# Zet op true om te testen of de WAV zelf correct klinkt
debug_local_playback = false

[logging]
level = INFO
