[bridge]
# TCP port for N1MM+ connection (Kenwood TS-2000 CAT emulation)
cat_port = 4532

# TCI server address
# Zeus (OpenHPSDR) : ws://192.168.x.x:40001
# Thetis           : ws://localhost:50001
# ExpertSDR3       : ws://localhost:50001
# ExpertSDR2       : ws://localhost:40001
tci_url = ws://192.168.x.x:40001

# TCI receiver index (0 = first receiver)
tci_receiver = 0

# Folder containing DVK WAV files (relative to this config file)
dvk_dir = dvk_wav

[audio]
# DVK playback volume to TCI TX stream (0.0 - 2.0, 1.0 = normal)
dvk_tx_volume = 1.0

# TCI audio sample rate in Hz
sample_rate = 48000

# Samples per TCI audio frame (2400 = 50ms at 48kHz)
frame_samples = 2400

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR
level = INFO
